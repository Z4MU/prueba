<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Formulario Offline + Formspree</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:18px;
border:1px solid #ccc;
border-radius:5px;
font-size:16px;
}

textarea{
resize:vertical;
height:150px;
}

.checkbox-container{
display:flex;
align-items:center;
margin-bottom:18px;
}

.checkbox-container label{
margin-left:10px;
font-size:14px;
}

button{
width:100%;
padding:14px;
font-size:18px;
background:#0078d7;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
margin-bottom:10px;
}

button:hover{
background:#005fa3;
}

.secondary{
background:#555;
}

.secondary:hover{
background:#333;
}
</style>
</head>

<body>

<div class="container">

<h2>Formulario Offline + Formspree</h2>

<form id="form">

<input type="text" id="nombre" placeholder="Nombre" required>
<input type="text" id="empresa" placeholder="Empresa">
<input type="email" id="email" placeholder="Email" required>
<input type="text" id="celular" placeholder="Celular">

<select id="servicio" required>
<option value="">Seleccione una opción</option>
<option>Normas y publicaciones</option>
<option>Formación, cursos, talleres y diplomados</option>
<option>Asistencia técnica</option>
<option>Traduccion de normas y documentos tecnicos</option>
</select>

<select id="tipoContacto" required>
<option value="">Seleccione una opción</option>
<option>Solicitar una cotización</option>
<option>Mas informacion</option>
<option>Quejas o comentarios</option>
</select>

<textarea id="mensaje" placeholder="Mensaje"></textarea>

<div class="checkbox-container">
<input type="checkbox" id="consentimiento" required>
<label for="consentimiento">
Doy mi consentimiento para que este formulario almacene mis datos.
</label>
</div>

<button type="submit">Guardar Registro</button>

</form>

<button class="secondary" onclick="descargarManual()">Descargar CSV Manual</button>

</div>

<script>

const FORMSPREE_URL="https://formspree.io/f/xpqydrnq";

// Obtener registros
function obtenerRegistros(){
return JSON.parse(localStorage.getItem("registrosForm"))||[];
}

// Guardar registros
function guardarRegistros(lista){
localStorage.setItem("registrosForm",JSON.stringify(lista));
}

// CSV
function generarCSV(registros){

if(registros.length===0)return "";

const encabezados=Object.keys(registros[0]).join(",");

const filas=registros
.map(reg=>Object.values(reg).map(v=>`"${v}"`).join(","))
.join("\n");

return encabezados+"\n"+filas;
}

// Descargar CSV
function descargarCSV(nombre,contenido){

const blob=new Blob([contenido],{type:"text/csv"});

const url=URL.createObjectURL(blob);

const a=document.createElement("a");
a.href=url;
a.download=nombre;
a.click();

URL.revokeObjectURL(url);
}

// Descargar manual
function descargarManual(){

const registros=obtenerRegistros();

if(registros.length===0){
alert("No hay registros para descargar.");
return;
}

const csv=generarCSV(registros);

descargarCSV("registros_manual.csv",csv);

alert("Archivo CSV descargado.");
}

// Enviar a Formspree
async function enviarAFormspree(data){

try{

await fetch(FORMSPREE_URL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
});

}catch(error){

console.log("No se pudo enviar a Formspree (modo offline)");

}

}

// Submit
document.getElementById("form").addEventListener("submit",async function(e){

e.preventDefault();

const nuevoRegistro={

nombre:document.getElementById("nombre").value,
empresa:document.getElementById("empresa").value,
email:document.getElementById("email").value,
celular:document.getElementById("celular").value,
servicio:document.getElementById("servicio").value,
tipoContacto:document.getElementById("tipoContacto").value,
mensaje:document.getElementById("mensaje").value,
consentimiento:document.getElementById("consentimiento").checked?"Sí":"No",
fecha:new Date().toLocaleString()

};

// guardar offline
let registros=obtenerRegistros();
registros.push(nuevoRegistro);
guardarRegistros(registros);

// enviar online
if(navigator.onLine){

await enviarAFormspree(nuevoRegistro);

}

// alerta
alert(`Registro guardado (${registros.length} acumulados).`);

// descarga automática
if(registros.length>=120){

const csv=generarCSV(registros);

descargarCSV("registros_acumulados.csv",csv);

alert("Se descargaron 120 registros. Se reinicia almacenamiento.");

localStorage.removeItem("registrosForm");

}

// limpiar
document.getElementById("form").reset();

});

</script>

</body>
</html>
