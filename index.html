<script>

const API_URL="https://script.google.com/macros/s/AKfycbxqFID_avDgWGDDjCYbuhLk2DNrDarUdRtsZ1tb9r5NUAcSYbmk0UL7SkcoLZspAcTPbg/exec";

// Obtener registros
function obtenerRegistros(){
return JSON.parse(localStorage.getItem("registrosForm"))||[];
}

// Guardar registros
function guardarRegistros(lista){
localStorage.setItem("registrosForm",JSON.stringify(lista));
}

// Enviar a Google Sheets
async function enviarAGoogleSheets(data){

try{

await fetch(API_URL,{
method:"POST",
mode:"no-cors",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
});

}catch(error){

console.log("No se pudo enviar a Google Sheets");

}

}

// Submit
document.getElementById("form").addEventListener("submit",async function(e){

e.preventDefault();

const nombre=document.getElementById("nombre").value;

// Adaptamos campos existentes
const producto=document.getElementById("servicio").value;

const talla=document.getElementById("tipoContacto").value;

// Usamos celular como cantidad solo como placeholder
const cantidad=document.getElementById("celular").value||"1";

// Construimos dirección combinando datos
const direccion=
document.getElementById("empresa").value + " | " +
document.getElementById("email").value + " | " +
document.getElementById("mensaje").value;

const nuevoRegistro={
nombre:nombre,
producto:producto,
talla:talla,
cantidad:cantidad,
direccion:direccion
};

// guardar offline
let registros=obtenerRegistros();
registros.push(nuevoRegistro);
guardarRegistros(registros);

// enviar online
if(navigator.onLine){

await enviarAGoogleSheets(nuevoRegistro);

}

alert("Registro enviado correctamente");

document.getElementById("form").reset();

});

</script>
